# Refer https://docs.halo.run/developer-guide/plugin/basics/manifest

apiVersion: plugin.halo.run/v1alpha1
kind: Plugin
metadata:
  # The name defines how the plugin is invoked, A unique name
  name: portfolio
spec:
  enabled: true
  requires: ">=2.24.0"
  author:
    name: Lywq
    website: https://github.com/liuyiwuqing
  settingName: plugin-portfolio-settings
  configMapName: plugin-portfolio-configmap
  logo: logo.png
  homepage: https://github.com/liuyiwuqing/halo-plugin-portfolio#readme
  repo: https://github.com/liuyiwuqing/halo-plugin-portfolio
  issues: https://github.com/liuyiwuqing/halo-plugin-portfolio/issues
  displayName: "项目集"
  description: "统一管理和展示 GitHub、Gitee、产品、插件、工具等项目作品。"
  license:
    - name: "GPL-3.0"
      url: "https://github.com/liuyiwuqing/halo-plugin-portfolio/blob/main/LICENSE"
