apiVersion: v1alpha1
kind: Setting
metadata:
  name: plugin-portfolio-settings
spec:
  forms:
    - group: general
      label: 通用设置
      formSchema:
        - $formkit: switch
          name: defaultPageEnabled
          key: defaultPageEnabled
          label: 启用默认展示页
          help: 开启后插件提供 /portfolio 和 /portfolio/{slug} 默认页面；主题也可以通过 Finder API 自行渲染。
          value: true
        - $formkit: number
          name: pageSize
          key: pageSize
          label: 默认每页数量
          value: 12
          validation: required|min:1|max:100
        - $formkit: text
          name: seoTitle
          key: seoTitle
          label: 默认 SEO 标题
          value: 项目作品集
        - $formkit: textarea
          name: seoDescription
          key: seoDescription
          label: 默认 SEO 描述
          value: 集中展示开源项目、产品、插件、工具和其他开发作品。
        - $formkit: array
          name: platformOptions
          key: platformOptions
          label: 平台选项
          help: 用于项目管理页的平台下拉和公开接口筛选值，value 建议使用小写英文、数字和下划线。
          itemLabels:
            - type: text
              label: $value.label
          value: [
            {
              "label": "GitHub",
              "value": "github"
            },
            {
              "label": "Gitee",
              "value": "gitee"
            },
            {
              "label": "独立站点",
              "value": "website"
            },
            {
              "label": "私有项目",
              "value": "private"
            },
            {
              "label": "其他",
              "value": "other"
            }
          ]
          children:
            - $formkit: text
              key: platformOptions_label
              name: label
              label: 显示名称
              validation: required
            - $formkit: text
              key: platformOptions_value
              name: value
              label: 选项值
              validation: required
        - $formkit: array
          name: typeOptions
          key: typeOptions
          label: 类型选项
          help: 用于项目管理页的类型下拉和公开接口筛选值，value 建议使用小写英文、数字和下划线。
          itemLabels:
            - type: text
              label: $value.label
          value: [
            {
              "label": "开源项目",
              "value": "open_source"
            },
            {
              "label": "产品",
              "value": "product"
            },
            {
              "label": "插件",
              "value": "plugin"
            },
            {
              "label": "网站",
              "value": "website"
            },
            {
              "label": "工具",
              "value": "tool"
            },
            {
              "label": "类库",
              "value": "library"
            },
            {
              "label": "其他",
              "value": "other"
            }
          ]
          children:
            - $formkit: text
              key: typeOptions_label
              name: label
              label: 显示名称
              validation: required
            - $formkit: text
              key: typeOptions_value
              name: value
              label: 选项值
              validation: required
