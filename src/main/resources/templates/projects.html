<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title}">项目作品集</title>
    <meta name="description" th:content="${description}" content="集中展示项目作品。"/>
    <style>
        :root {
            --portfolio-ink: #172033;
            --portfolio-muted: #667085;
            --portfolio-line: #e5e7eb;
            --portfolio-bg: #f7f8fb;
            --portfolio-surface: #fff;
            --portfolio-accent: #0f766e;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            color: var(--portfolio-ink);
            background: var(--portfolio-bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            line-height: 1.65;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .portfolio-page {
            max-width: 1120px;
            margin: 0 auto;
            padding: 56px 20px 72px;
        }

        .portfolio-header {
            margin-bottom: 28px;
        }

        .portfolio-header h1 {
            margin: 0 0 8px;
            font-size: 34px;
            line-height: 1.2;
        }

        .portfolio-header p {
            margin: 0;
            max-width: 720px;
            color: var(--portfolio-muted);
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 18px;
        }

        .portfolio-card {
            display: flex;
            min-height: 220px;
            flex-direction: column;
            gap: 14px;
            padding: 18px;
            background: var(--portfolio-surface);
            border: 1px solid var(--portfolio-line);
            border-radius: 8px;
        }

        .portfolio-card__cover {
            height: 128px;
            margin: -18px -18px 0;
            overflow: hidden;
            border-radius: 8px 8px 0 0;
            background: #e8eef4;
        }

        .portfolio-card__cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .portfolio-card h2 {
            margin: 0;
            font-size: 18px;
        }

        .portfolio-card p {
            margin: 0;
            color: var(--portfolio-muted);
            font-size: 14px;
        }

        .portfolio-meta,
        .portfolio-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .portfolio-chip {
            display: inline-flex;
            align-items: center;
            min-height: 24px;
            padding: 2px 8px;
            border-radius: 999px;
            background: #eef7f6;
            color: var(--portfolio-accent);
            font-size: 12px;
        }

        .portfolio-card__footer {
            display: flex;
            gap: 12px;
            margin-top: auto;
            font-size: 14px;
        }

        .portfolio-card__footer a {
            color: var(--portfolio-accent);
            font-weight: 600;
        }

        .portfolio-empty {
            padding: 36px;
            text-align: center;
            background: var(--portfolio-surface);
            border: 1px dashed var(--portfolio-line);
            border-radius: 8px;
            color: var(--portfolio-muted);
        }
    </style>
</head>
<body>
<main class="portfolio-page">
    <header class="portfolio-header">
        <h1 th:text="${title}">项目作品集</h1>
        <p th:text="${description}">集中展示开源项目、产品、插件、工具和其他开发作品。</p>
    </header>

    <div class="portfolio-empty" th:if="${projects.items == null || projects.items.isEmpty()}">
        暂无公开项目。
    </div>

    <section class="portfolio-grid" th:if="${projects.items != null && !projects.items.isEmpty()}">
        <article class="portfolio-card" th:each="project : ${projects.items}">
            <a class="portfolio-card__cover" th:if="${project.cover != null && !project.cover.isEmpty()}"
               th:href="@{'/projects/' + ${project.slug}}">
                <img th:src="${project.cover}" th:alt="${project.title}"/>
            </a>
            <div class="portfolio-meta">
                <span class="portfolio-chip"
                      th:text="${project.platform != null ? (platformLabels[project.platform] ?: project.platform) : 'other'}">other</span>
                <span class="portfolio-chip"
                      th:text="${project.type != null ? (typeLabels[project.type] ?: project.type) : 'other'}">other</span>
                <span class="portfolio-chip" th:if="${project.featured}">推荐</span>
            </div>
            <h2>
                <a th:href="@{'/projects/' + ${project.slug}}" th:text="${project.title}">项目标题</a>
            </h2>
            <p th:text="${project.summary}">项目摘要</p>
            <div class="portfolio-tags" th:if="${project.techStacks != null && !project.techStacks.isEmpty()}">
                <span class="portfolio-chip" th:each="stack : ${project.techStacks}" th:text="${stack}">Java</span>
            </div>
            <div class="portfolio-card__footer">
                <a th:href="@{'/projects/' + ${project.slug}}">详情</a>
                <a th:if="${project.repoUrl != null && !project.repoUrl.isEmpty()}" th:href="${project.repoUrl}" target="_blank"
                   rel="noopener">仓库</a>
                <a th:if="${project.demoUrl != null && !project.demoUrl.isEmpty()}" th:href="${project.demoUrl}" target="_blank"
                   rel="noopener">演示</a>
            </div>
        </article>
    </section>
</main>
</body>
</html>
