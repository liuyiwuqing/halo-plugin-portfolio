<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title}">项目详情</title>
    <meta name="description" th:content="${description}" content="项目详情"/>
    <style>
        :root {
            --portfolio-ink: #172033;
            --portfolio-muted: #667085;
            --portfolio-line: #e5e7eb;
            --portfolio-bg: #f7f8fb;
            --portfolio-surface: #fff;
            --portfolio-accent: #0f766e;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            color: var(--portfolio-ink);
            background: var(--portfolio-bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            line-height: 1.72;
        }

        a {
            color: var(--portfolio-accent);
            text-decoration: none;
        }

        .portfolio-detail {
            max-width: 880px;
            margin: 0 auto;
            padding: 48px 20px 72px;
        }

        .portfolio-back {
            display: inline-flex;
            margin-bottom: 22px;
            font-size: 14px;
            font-weight: 600;
        }

        .portfolio-article {
            padding: 28px;
            background: var(--portfolio-surface);
            border: 1px solid var(--portfolio-line);
            border-radius: 8px;
        }

        .portfolio-cover {
            width: 100%;
            max-height: 420px;
            margin-bottom: 24px;
            object-fit: cover;
            border-radius: 8px;
            background: #e8eef4;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 34px;
            line-height: 1.2;
        }

        .summary {
            margin: 0 0 20px;
            color: var(--portfolio-muted);
        }

        .meta,
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 18px;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            min-height: 26px;
            padding: 2px 9px;
            border-radius: 999px;
            background: #eef7f6;
            color: var(--portfolio-accent);
            font-size: 13px;
        }

        .actions a {
            display: inline-flex;
            align-items: center;
            min-height: 34px;
            padding: 6px 12px;
            border: 1px solid var(--portfolio-line);
            border-radius: 6px;
            font-weight: 600;
        }

        .content {
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
<main class="portfolio-detail">
    <a class="portfolio-back" href="/projects">返回项目列表</a>
    <article class="portfolio-article">
        <img class="portfolio-cover" th:if="${project.cover != null && !project.cover.isEmpty()}"
             th:src="${project.cover}" th:alt="${project.title}"/>
        <div class="meta">
            <span class="chip"
                  th:text="${project.platform != null ? (platformLabels[project.platform] ?: project.platform) : 'other'}">other</span>
            <span class="chip"
                  th:text="${project.type != null ? (typeLabels[project.type] ?: project.type) : 'other'}">other</span>
            <span class="chip" th:if="${project.featured}">推荐</span>
        </div>
        <h1 th:text="${project.title}">项目标题</h1>
        <p class="summary" th:text="${project.summary}">项目摘要</p>
        <div class="meta" th:if="${project.techStacks != null && !project.techStacks.isEmpty()}">
            <span class="chip" th:each="stack : ${project.techStacks}" th:text="${stack}">Java</span>
        </div>
        <div class="actions">
            <a th:if="${project.repoUrl != null && !project.repoUrl.isEmpty()}" th:href="${project.repoUrl}" target="_blank"
               rel="noopener">查看仓库</a>
            <a th:if="${project.demoUrl != null && !project.demoUrl.isEmpty()}" th:href="${project.demoUrl}" target="_blank"
               rel="noopener">在线演示</a>
            <a th:if="${project.docsUrl != null && !project.docsUrl.isEmpty()}" th:href="${project.docsUrl}" target="_blank"
               rel="noopener">项目文档</a>
        </div>
        <div class="content" th:text="${project.content ?: project.summary}">项目详情</div>
    </article>
</main>
</body>
</html>
