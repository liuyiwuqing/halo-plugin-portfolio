<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="portfolio-logo-title portfolio-logo-desc">
  <title id="portfolio-logo-title">Portfolio</title>
  <desc id="portfolio-logo-desc">A portfolio plugin logo combining a P monogram, project cards, and a featured project node.</desc>
  <defs>
    <linearGradient id="portfolio-bg" x1="28" y1="18" x2="228" y2="238" gradientUnits="userSpaceOnUse">
      <stop stop-color="#006AFF"/>
      <stop offset="0.52" stop-color="#0F766E"/>
      <stop offset="1" stop-color="#101828"/>
    </linearGradient>
    <radialGradient id="portfolio-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(197 55) rotate(135) scale(118)">
      <stop stop-color="#58E6C4"/>
      <stop offset="1" stop-color="#58E6C4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="portfolio-paper" x1="63" y1="50" x2="181" y2="197" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#DDE8F5"/>
    </linearGradient>
    <linearGradient id="portfolio-accent" x1="105" y1="135" x2="171" y2="185" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1BE1B6"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <filter id="portfolio-shadow" x="34" y="34" width="190" height="190" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="13" stdDeviation="13" flood-color="#06121F" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="256" height="256" rx="56" fill="url(#portfolio-bg)"/>
  <circle cx="197" cy="55" r="100" fill="url(#portfolio-glow)" opacity="0.72"/>
  <path d="M34 207C78 166 126 154 214 170" stroke="#FFFFFF" stroke-opacity="0.13" stroke-width="18" stroke-linecap="round"/>
  <g filter="url(#portfolio-shadow)">
    <rect x="54" y="49" width="35" height="158" rx="17.5" fill="url(#portfolio-paper)"/>
    <path d="M86 49H150C184.9 49 207 69.8 207 99.5C207 129.2 184.9 150 150 150H86V49Z" fill="url(#portfolio-paper)"/>
    <rect x="113" y="79" width="62" height="40" rx="20" fill="#102033" opacity="0.92"/>
    <rect x="106" y="136" width="64" height="48" rx="16" fill="url(#portfolio-accent)"/>
    <rect x="126" y="154" width="59" height="39" rx="14" fill="#F8FAFC"/>
    <rect x="141" y="165" width="26" height="7" rx="3.5" fill="#0F766E"/>
    <rect x="141" y="177" width="18" height="6" rx="3" fill="#FABD3D"/>
  </g>
  <circle cx="190" cy="64" r="8" fill="#FABD3D"/>
  <circle cx="188" cy="63" r="3.5" fill="#FFFFFF" opacity="0.72"/>
</svg>
